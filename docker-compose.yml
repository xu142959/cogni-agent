version: "3.9"

services:
  cogni-agent:
    build: .
    image: cogni-agent:latest
    container_name: cogni-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/home/cogni/data
      - ./config:/home/cogni/config
    stdin_open: true
    tty: true
    restart: unless-stopped

  # Optional: Web Console (see web_console/README.md)
  # web-console:
  #   build: ./web_console
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_API_KEY:-}
  #   depends_on:
  #     - cogni-agent